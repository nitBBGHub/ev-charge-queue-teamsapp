<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>EV Charge Queue Setup</title>
<script src="https://unpkg.com/@microsoft/teams-js@2.22.0/dist/MicrosoftTeams.min.js"></script>
</head>
<body style="background:#07101d;color:#e2e8f0;font-family:Segoe UI,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
  <div style="text-align:center;padding:32px">
    <div style="font-size:48px;margin-bottom:16px">⚡</div>
    <h2 style="margin-bottom:8px">EV Charge Queue</h2>
    <p style="color:#64748b" id="msg">Setting up...</p>
  </div>
<script>
(function() {
  var url = "https://nitbbghub.github.io/ev-charge-queue-teamsapp";

  function ready(msg) {
    document.getElementById("msg").innerHTML = msg;
  }

  // Try v2
  if (microsoftTeams && microsoftTeams.app) {
    microsoftTeams.app.initialize().then(function() {
      microsoftTeams.pages.config.setValidState(true);
      microsoftTeams.pages.config.registerOnSaveHandler(function(evt) {
        microsoftTeams.pages.config.setConfig({
          entityId: "evqueue",
          contentUrl: url,
          websiteUrl: url,
          suggestedDisplayName: "EV Charge Queue"
        }).then(function() { evt.notifySuccess(); });
      });
      ready("✅ Ready — click <b>Save</b> above");
    }).catch(function(e) {
      ready("Error: " + e);
    });
  } else {
    ready("Teams SDK not loaded");
  }
})();
</script>
</body>
</html>
