<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>EV Charge Queue Setup</title>
<script src="https://statics.teams.cdn.office.net/sdk/v1.6.0/js/MicrosoftTeams.min.js"></script>
</head>
<body style="background:#07101d;color:#e2e8f0;font-family:Segoe UI,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
  <div style="text-align:center;padding:32px;max-width:400px">
    <div style="font-size:48px;margin-bottom:16px">⚡</div>
    <h2 style="margin-bottom:8px">EV Charge Queue</h2>
    <p style="color:#64748b;margin-bottom:24px">Click <b>Save</b> to add this tab to your chat or channel.</p>
    <p style="color:#22d3ee;font-family:monospace;font-size:12px" id="msg">Initializing...</p>
  </div>
<script>
  var url = "https://nitbbghub.github.io/ev-charge-queue-teamsapp";

  microsoftTeams.initialize();

  // Correct function name is setValidityState (not setValidState)
  microsoftTeams.settings.setValidityState(true);

  microsoftTeams.settings.registerOnSaveHandler(function(saveEvent) {
    microsoftTeams.settings.setSettings({
      entityId: "evChargeQueue",
      contentUrl: url,
      websiteUrl: url,
      suggestedDisplayName: "EV Charge Queue"
    });
    saveEvent.notifySuccess();
  });

  document.getElementById("msg").textContent = "✅ Ready — click Save above";
  document.getElementById("msg").style.color = "#4ade80";
</script>
</body>
</html>
